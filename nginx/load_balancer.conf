events {
    worker_connections 1024;
}


http {
    resolver 127.0.0.11 valid=5s;

    geo $is_trusted {
        default 0;
        172.20.0.0/16 1; 
    }

    # Формируем чистый IP пользователя
    map $is_trusted $temp_client_ip {
        0       $remote_addr;
        1       $http_x_real_ip;
    }

    map $temp_client_ip $first_client_ip {
        ""      $remote_addr;
        default $temp_client_ip;
    }

    upstream backend_chain {
        server nginx1:80;
        server nginx2:80;
        server nginx3:80;
        server nginx4:80;
        server nginx5:80;
    }

    server {
        listen 80;
        server_name _;

        location / {
            proxy_set_header X-Real-IP $first_client_ip;
            proxy_set_header X-Forwarded-For "$first_client_ip, $server_addr";
            proxy_set_header X-Internal-Chain "true"; 
            proxy_set_header Host $host;
            proxy_pass http://backend_chain;
        }
    }
}